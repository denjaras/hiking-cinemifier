<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Location Map</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="stage">
    <!-- Update this timestamp on every revision so the deployed version is
         instantly recognizable. -->
    <h1 id="pageTitle">Live Location Map <small style="font-size:0.5em;font-weight:normal;opacity:0.7;">rev. 2026-07-20 22:34</small></h1>
    <div id="layout">
      <div id="hud">
        <div id="status" class="status">Tap "Locate me" to start tracking.</div>
        <dl id="readout" class="readout">
          <div><dt>Lat</dt><dd id="lat">—</dd></div>
          <div><dt>Lng</dt><dd id="lng">—</dd></div>
          <div><dt>Accuracy</dt><dd id="acc">—</dd></div>
          <div><dt>Speed</dt><dd id="speed">—</dd></div>
          <div><dt>Heading</dt><dd id="heading">—</dd></div>
        </dl>
        <div class="controls">
          <button id="startBtn" type="button">Locate me</button>
          <button id="stopBtn" type="button" class="btn-stop" hidden>Stop tracking</button>
          <button id="recenterBtn" type="button">Recenter</button>
        </div>

        <div class="trails">
          <h2 class="trails-title">Trails</h2>
          <ul id="trailList" class="trail-list">
            <li class="trail-empty">Loading trails…</li>
          </ul>
        </div>
      </div>

      <div id="mapWrap">
        <div id="map"></div>

        <div id="trailModal" class="trail-modal" hidden>
          <button id="trailModalClose" class="trail-modal-close" type="button" aria-label="Close">&times;</button>
          <h2 id="trailModalTitle" class="trail-modal-title"></h2>
          <p id="trailModalMeta" class="trail-modal-meta"></p>
          <p id="trailModalDesc" class="trail-modal-desc"></p>
          <button id="trailModalStart" class="trail-modal-start" type="button">Start</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- Trail data (one script per route) -->
  <script src="trails/nussberg-nussdorf.gpx.js"></script>
  <script src="trails/test-westbahnhof.gpx.js"></script>

  <script src="app.js"></script>
</body>
</html>
